name: FptnShared CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fptnshared-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Environment
        run: |
          sw_vers
          uname -m
          xcodebuild -version
          swift --version

      - name: Run tests
        run: swift test --parallel
